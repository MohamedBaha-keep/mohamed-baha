  <!--   javascript  -->


  <script>


const states = ["نواكشوط", "نواذيبو", "أطار", "تجكجة", "سيلبابي", "كيفة", "اكجوجت", "روصو", "النعمة", "الزويرات"];
const suggestionsBox = document.getElementById("suggestions");
const searchInput = document.getElementById("stateSearch");

function filterStates() {
  const query = searchInput.value.toLowerCase();
  const filtered = states.filter(state => state.toLowerCase().includes(query));
  
  renderSuggestions(filtered);
}

function renderSuggestions(list) {
  suggestionsBox.innerHTML = "";
  if (list.length === 0) {
    suggestionsBox.classList.add("hidden");
    return;
  }

  list.forEach(state => {
    const li = document.createElement("li");
    li.textContent = state;

    li.onclick = () => {
      searchInput.value = state;
      suggestionsBox.classList.add("hidden");

    
      const stateURL = encodeURIComponent(state);

      //states if clicked    

      if (state === "نواكشوط") {
        window.location.href = "./nouackshoot/index.html";
      } else {
       window.location.href = `states/${stateURL}.html`;
      }
    };

    suggestionsBox.appendChild(li); // <-- You missed this part too!
  });

  suggestionsBox.classList.remove("hidden");
}

function showSuggestions() {
  filterStates();
}

// Hide on click outside
document.addEventListener("click", function (e) {
  if (!e.target.closest(".search-container")) {
    suggestionsBox.classList.add("hidden");
  }
});


  </script>
